<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef, useCallback } = React;

/* ── Pseudocode ───────────────────────────────── */
const PSEUDO = [
{ id: 0, text: 'BubbleSort(A, crit):' },
{ id: 1, text: '  n ← len(A)' },
{ id: 2, text: '  para i = 0 → n−1:' },
{ id: 3, text: '    para j = 0 → n−i−2:' },
{ id: 4, text: '      si A[j]>A[j+1]:' },
{ id: 5, text: '        swap(A[j],A[j+1])' },
{ id: 6, text: '      fin si' },
{ id: 7, text: '    fin para' },
{ id: 8, text: '  fin para' },
{ id: 9, text: 'fin' }];


/* ── Data helpers ─────────────────────────────── */
let _uid = 0;
function mkOrder(nombre, prod, entr, prio) {
  return { id: _uid++, nombre, tiempo_produccion: prod, tiempo_entrega: entr, prioridad: prio };
}
function randomOrder() {
  const noms = ['Pizzas', 'Torta', 'Empanadas', 'Sushi', 'Tacos', 'Milanesas', 'Burgers', 'Pasta', 'Wraps', 'Paella'];
  return mkOrder(
    noms[Math.floor(Math.random() * noms.length)],
    Math.floor(Math.random() * 241) + 10,
    Math.floor(Math.random() * 371) + 30,
    Math.floor(Math.random() * 5) + 1
  );
}
function initOrders() {_uid = 0;return Array.from({ length: 6 }, randomOrder);}
const CRIT_LABELS = { tiempo_produccion: 'Producción', tiempo_entrega: 'Entrega', prioridad: 'Prioridad' };

/* ── App ──────────────────────────────────────── */
function App() {
  const [masterOrders, setMasterOrders] = useState(initOrders);
  const [display, setDisplay] = useState(null);
  const [criterion, setCriterion] = useState('tiempo_produccion');
  const [ascending, setAscending] = useState(true);
  const [speed, setSpeed] = useState(550);
  const [status, setStatus] = useState('idle');
  const [comparing, setComparing] = useState([]);
  const [swapping, setSwapping] = useState([]);
  const [sorted, setSorted] = useState([]);
  const [activeLine, setActiveLine] = useState(null);
  const [comparisons, setComparisons] = useState(0);
  const [swaps, setSwaps] = useState(0);
  const [iteration, setIteration] = useState(0);
  const [statusMsg, setStatusMsg] = useState('');
  /* form */
  const [fNombre, setFNombre] = useState('');
  const [fProd, setFProd] = useState('');
  const [fEntr, setFEntr] = useState('');
  const [fPri, setFPri] = useState('');
  /* chart sizing */
  const chartRef = useRef(null);
  const [chartH, setChartH] = useState(300);
  /* control refs */
  const pauseRef = useRef(false);
  const cancelRef = useRef(false);
  const speedRef = useRef(speed);

  useEffect(() => {speedRef.current = speed;}, [speed]);

  useEffect(() => {
    if (!chartRef.current) return;
    const obs = new ResizeObserver(([e]) => setChartH(Math.max(e.contentRect.height - 30, 60)));
    obs.observe(chartRef.current);
    return () => obs.disconnect();
  }, []);

  const shown = display ?? masterOrders;

  const resetAnim = () => {
    setComparing([]);setSwapping([]);setSorted([]);
    setActiveLine(null);setComparisons(0);setSwaps(0);
    setIteration(0);setStatusMsg('');
  };

  /* ── Add order */
  const handleAdd = () => {
    if (status === 'running') return;
    const nombre = fNombre.trim() || 'Pedido';
    const prod = Math.min(250, Math.max(10, parseInt(fProd) || 60));
    const entr = Math.min(400, Math.max(30, parseInt(fEntr) || 120));
    const prio = Math.min(5, Math.max(1, parseInt(fPri) || 3));
    setMasterOrders((prev) => [...prev, mkOrder(nombre, prod, entr, prio)]);
    setDisplay(null);resetAnim();setStatus('idle');
    setFNombre('');setFProd('');setFEntr('');setFPri('');
  };

  /* ── Generate batch */
  const handleGenerate = () => {
    if (status === 'running') return;
    cancelRef.current = true;pauseRef.current = false;
    const orders = Array.from({ length: 6 }, randomOrder);
    setMasterOrders(orders);setDisplay(null);setStatus('idle');resetAnim();
  };

  /* ── Remove one */
  const handleRemove = (id) => {
    if (status === 'running') return;
    setMasterOrders((prev) => prev.filter((o) => o.id !== id));
    setDisplay(null);resetAnim();setStatus('idle');
  };

  /* ── Clear all */
  const handleClear = () => {
    if (status === 'running') return;
    cancelRef.current = true;pauseRef.current = false;
    _uid = 0;setMasterOrders([]);setDisplay(null);setStatus('idle');resetAnim();
  };

  /* ── Reset */
  const handleReset = () => {
    cancelRef.current = true;pauseRef.current = false;
    setTimeout(() => {setDisplay(null);setStatus('idle');resetAnim();}, 60);
  };

  /* ── Pause / Resume */
  const handlePause = () => {
    if (status === 'running') {
      pauseRef.current = true;setStatus('paused');setStatusMsg('Pausado.');
    } else if (status === 'paused') {
      pauseRef.current = false;setStatus('running');
    }
  };

  /* ── Run sort */
  const handleStart = async () => {
    if (status === 'running' || masterOrders.length < 2) return;
    cancelRef.current = false; pauseRef.current = false;

    const A = masterOrders.map(o => ({ ...o }));
    let cmp = 0, swp = 0;
    const sortedSet = new Set();

    const tick       = ()  => new Promise(r => setTimeout(r, speedRef.current));
    const waitResume = ()  => new Promise(r => { const c = () => pauseRef.current ? setTimeout(c, 80) : r(); c(); });
    const dead       = ()  => cancelRef.current;

    // Force every animation frame to paint immediately — fixes React 18 batching
    const show = (s) => {
      ReactDOM.flushSync(() => {
        setActiveLine(s.line  ?? null);
        setComparing(s.cmp   ?? []);
        setSwapping(s.swp    ?? []);
        if (s.sorted     !== undefined) setSorted(s.sorted);
        if (s.comparisons !== undefined) setComparisons(s.comparisons);
        if (s.swaps      !== undefined) setSwaps(s.swaps);
        if (s.iter       !== undefined) setIteration(s.iter);
        if (s.msg        !== undefined) setStatusMsg(s.msg);
        if (s.display    !== undefined) setDisplay(s.display);
      });
    };

    // Init
    ReactDOM.flushSync(() => {
      setComparing([]); setSwapping([]); setSorted([]);
      setActiveLine(0); setComparisons(0); setSwaps(0);
      setIteration(0); setStatusMsg('');
      setDisplay([...A]); setStatus('running');
    });
    await tick();

    try {
      const n = A.length;
      show({ line: 1 }); await tick();

      for (let i = 0; i < n - 1; i++) {
        await waitResume(); if (dead()) return;
        show({ line: 2, iter: i + 1 }); await tick();

        for (let j = 0; j < n - i - 1; j++) {
          await waitResume(); if (dead()) return;
          show({ line: 3 }); await tick();

          // ── Compare
          cmp++;
          show({
            line: 4,
            cmp: [j, j + 1],
            comparisons: cmp,
            display: [...A],
            msg: `Comparando: ${A[j].nombre} (${A[j][criterion]}) vs ${A[j+1].nombre} (${A[j+1][criterion]})`
          });
          await tick();

          const doSwap = ascending
            ? A[j][criterion] > A[j + 1][criterion]
            : A[j][criterion] < A[j + 1][criterion];

          if (doSwap) {
            swp++;
            // ── Show red before swapping
            show({
              line: 5,
              swp: [j, j + 1],
              swaps: swp,
              display: [...A],
              msg: `↔ Intercambiando: ${A[j].nombre} ↔ ${A[j+1].nombre}`
            });
            await tick();
            // ── Actually swap
            [A[j], A[j + 1]] = [A[j + 1], A[j]];
            show({ line: 5, swp: [j, j + 1], swaps: swp, display: [...A] });
            await tick();
          }

          show({ line: 6 }); await tick();
        }

        // ── Mark last element of pass as sorted
        sortedSet.add(n - 1 - i);
        show({ line: 7, sorted: [...sortedSet], display: [...A] });
        await tick();
      }

      // ── All sorted
      const allSorted = Array.from({ length: n }, (_, k) => k);
      show({ line: 8, sorted: allSorted, display: [...A] }); await tick();
      show({ line: 9, sorted: allSorted });

      ReactDOM.flushSync(() => {
        setComparing([]); setSwapping([]);
        setMasterOrders([...A]); setDisplay(null);
        setStatus('done');
        setStatusMsg(`✓ Completo — ${cmp} comparaciones, ${swp} intercambios`);
      });

    } catch (e) { if (e !== 'cancel') throw e; }
  };

  const maxVal = Math.max(...shown.map((o) => o[criterion]), 1);
  const bState = (i) => swapping.includes(i) ? 'swapping' : comparing.includes(i) ? 'comparing' : sorted.includes(i) ? 'sorted' : 'normal';
  const rCls = (i) => swapping.includes(i) ? 'row-swp' : comparing.includes(i) ? 'row-cmp' : sorted.includes(i) ? 'row-srt' : '';
  const short = (s) => s.length > 9 ? s.slice(0, 8) + '…' : s;

  const statusCls = { idle: 'idle', running: 'running', paused: 'paused', done: 'done' }[status];
  const statusTxt = { idle: 'IDLE', running: 'SORTING', paused: 'PAUSED', done: 'DONE' }[status];
  const isRunning = status === 'running';
  const canRun = status === 'idle' && shown.length >= 2;
  const canPause = status === 'running' || status === 'paused';
  const canReset = status !== 'idle';

  return (
    <div className="shell">

      {/* ── HEADER ── */}
      <header className="hdr">
        <span className="hdr-title">Bubble Sort</span>
        <div className="hdr-divider" />
        <span className="hdr-sub">Simulador · Gestión de Pedidos</span>
        <div className="hdr-spacer" />
        <span className={`status-badge ${statusCls}`}>{statusTxt}</span>
      </header>

      {/* ── FORM BAR ── */}
      <div className="form-bar">
        <input className="input-name" placeholder="Nombre del pedido"
        value={fNombre} onChange={(e) => setFNombre(e.target.value)}
        onKeyDown={(e) => e.key === 'Enter' && handleAdd()} disabled={isRunning} />
        <input className="input-num" placeholder="Prod (min)" type="number" min={10} max={250}
        value={fProd} onChange={(e) => setFProd(e.target.value)}
        onKeyDown={(e) => e.key === 'Enter' && handleAdd()} disabled={isRunning} />
        <input className="input-num" placeholder="Entr (min)" type="number" min={30} max={400}
        value={fEntr} onChange={(e) => setFEntr(e.target.value)}
        onKeyDown={(e) => e.key === 'Enter' && handleAdd()} disabled={isRunning} />
        <input style={{ width: 80 }} placeholder="Prioridad" type="number" min={1} max={5}
        value={fPri} onChange={(e) => setFPri(e.target.value)}
        onKeyDown={(e) => e.key === 'Enter' && handleAdd()} disabled={isRunning} />
        <button className="btn-add" onClick={handleAdd} disabled={isRunning}>+ Agregar</button>
        <div className="form-sep" />
        <button className="btn-secondary" onClick={handleGenerate} disabled={isRunning}>Aleatorios</button>
        <button className="btn-danger" onClick={handleClear} disabled={isRunning}>Limpiar todo</button>
      </div>

      {/* ── WORKSPACE ── */}
      <div className="workspace">

        {/* LEFT */}
        <aside className="left-panel">
          <div className="panel-head">Pseudocódigo</div>
          <div className="pseudo-block">
            <div className="pseudocode">
              {PSEUDO.map((l) =>
              <span key={l.id} className={`pline${activeLine === l.id ? ' active' : ''}${status === 'done' && l.id < 9 ? ' done-line' : ''}`}>
                  {l.text}
                </span>
              )}
            </div>
          </div>
          <div className="metrics-strip">
            <div className="metric-cell">
              <span className="metric-n">{comparisons}</span>
              <span className="metric-lbl">Comp.</span>
            </div>
            <div className="metric-cell">
              <span className={`metric-n${swaps > 0 ? ' accent' : ''}`}>{swaps}</span>
              <span className="metric-lbl">Swap</span>
            </div>
            <div className="metric-cell">
              <span className="metric-n">{iteration}</span>
              <span className="metric-lbl">Iter.</span>
            </div>
            <div className="metric-cell">
              <span className={`metric-n${sorted.length > 0 ? ' green' : ''}`}>{sorted.length}</span>
              <span className="metric-lbl">Ord.</span>
            </div>
          </div>
          <div className="status-line">
            {statusMsg ?
            statusMsg.startsWith('↔') ?
            <span className="hl">{statusMsg}</span> :
            statusMsg :
            <span style={{ color: '#3a3a3a' }}>—</span>}
          </div>
        </aside>

        {/* CENTER — chart */}
        <main className="chart-panel" ref={chartRef}>
          <div className="chart-legend-row">
            <div className="legend-item"><div className="legend-dot" style={{ background: '#3d4451' }} />Normal</div>
            <div className="legend-item"><div className="legend-dot" style={{ background: '#f0a030' }} />Comparando</div>
            <div className="legend-item"><div className="legend-dot" style={{ background: '#e05040' }} />Intercambiando</div>
            <div className="legend-item"><div className="legend-dot" style={{ background: '#4aaa5a' }} />Ordenado</div>
            <span className="chart-crit-label">{CRIT_LABELS[criterion]} · {ascending ? '↑ asc' : '↓ desc'}</span>
          </div>
          <div className="chart-body">
            {/* grid lines */}
            <div className="chart-grid">
              {[0, 1, 2, 3, 4].map((i) => <div key={i} className="chart-grid-line" />)}
            </div>
            {shown.length === 0 &&
            <div style={{ width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#d1d5db', fontSize: 12 }}>
                Agrega pedidos para comenzar
              </div>
            }
            {shown.map((o, i) => {
              const st = bState(i);
              const h = Math.max(Math.round(o[criterion] / maxVal * chartH * 0.90), Math.round(chartH * 0.10));
              return (
                <div className="bar-col" key={o.id}>
                  <span className={`bar-val${st === 'comparing' ? ' cmp' : st === 'swapping' ? ' swp' : st === 'sorted' ? ' srt' : ''}`}>
                    {o[criterion]}
                  </span>
                  <div className={`bar ${st}`} style={{ height: h }} />
                  <div className="bar-id">P{o.id}</div>
                </div>);

            })}
          </div>
        </main>

        {/* RIGHT — table */}
        <aside className="right-panel">
          <div className="table-header-row">
            <span className="panel-head" style={{ padding: 0, borderBottom: 'none' }}>Pedidos ({shown.length})</span>
          </div>
          <div className="table-scroll">
            {shown.length === 0 ?
            <div className="empty-table">Sin pedidos. Agrega uno arriba.</div> :

            <table>
                  <colgroup>
                    <col style={{ width: 18 }} />
                    <col style={{ width: 26 }} />
                    <col />
                    <col style={{ width: 36 }} />
                    <col style={{ width: 38 }} />
                    <col style={{ width: 24 }} />
                  </colgroup>
                  <thead>
                    <tr>
                      <th></th>
                      <th>ID</th>
                      <th>Nombre</th>
                      <th className={criterion === 'tiempo_produccion' ? 'ac' : ''}>Prod</th>
                      <th className={criterion === 'tiempo_entrega' ? 'ac' : ''}>Entr</th>
                      <th className={criterion === 'prioridad' ? 'ac' : ''}>Pri</th>
                    </tr>
                  </thead>
                  <tbody>
                    {shown.map((o, i) =>
                <tr key={o.id} className={rCls(i)}>
                        <td style={{ padding: '3px 2px' }}>
                          <button className="remove-btn" onClick={() => handleRemove(o.id)} disabled={isRunning} title="Eliminar">✕</button>
                        </td>
                        <td className="dim">P{o.id}</td>
                        <td style={{ fontSize: 11 }}>{o.nombre}</td>
                        <td className={criterion === 'tiempo_produccion' ? 'ac' : 'mono'}>{o.tiempo_produccion}</td>
                        <td className={criterion === 'tiempo_entrega' ? 'ac' : 'mono'}>{o.tiempo_entrega}</td>
                        <td className={criterion === 'prioridad' ? 'ac' : 'mono'}>{o.prioridad}</td>
                      </tr>
                )}
                  </tbody>
                </table>

            }
          </div>
        </aside>
      </div>

      {/* ── CONTROLS BAR ── */}
      <footer className="controls-bar">
        <div className="ctrl-group">
          <span className="ctrl-label">Criterio</span>
          <select className="ctrl-select" value={criterion} onChange={(e) => setCriterion(e.target.value)} disabled={isRunning}>
            <option value="tiempo_produccion">Producción</option>
            <option value="tiempo_entrega">Entrega</option>
            <option value="prioridad">Prioridad</option>
          </select>
        </div>
        <div className="ctrl-sep" />
        <div className="ctrl-group">
          <span className="ctrl-label">Orden</span>
          <select className="ctrl-select" value={ascending ? 'asc' : 'desc'} onChange={(e) => setAscending(e.target.value === 'asc')} disabled={isRunning}>
            <option value="asc">Ascendente ↑</option>
            <option value="desc">Descendente ↓</option>
          </select>
        </div>
        <div className="ctrl-sep" />
        <div className="ctrl-group ctrl-range">
          <span className="ctrl-label">Velocidad</span>
          <input type="range" min={60} max={1400} step={40} value={speed} onChange={(e) => setSpeed(+e.target.value)} />
          <span className="speed-val">{speed}ms</span>
        </div>
        <div className="ctrl-sep" />
        <div className="ctrl-group" style={{ gap: 6 }}>
          <button className="btn btn-run" onClick={handleStart} disabled={!canRun}>▶ Iniciar</button>
          <button className="btn btn-pause" onClick={handlePause} disabled={!canPause}>
            {status === 'paused' ? '▶ Reanudar' : '⏸ Pausar'}
          </button>
          <button className="btn btn-reset" onClick={handleReset} disabled={!canReset}>↺ Reiniciar</button>
        </div>
        <div className="ctrl-status">
          {statusMsg ?
          statusMsg.startsWith('↔') ?
          <span className="hl">{statusMsg}</span> :
          statusMsg :
          shown.length < 2 ?
          'Agrega al menos 2 pedidos' :
          `Listo · ${shown.length} pedidos · ${CRIT_LABELS[criterion]}`}
        </div>
      </footer>
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
